}

// ═══════════════════════════════════════════════════════════════
// SHARED RENDER HELPERS
// ═══════════════════════════════════════════════════════════════
function ch(eye, name, right) {
  return `<div class="ch">
    <div><div class="ch-eye">${eye}</div><div class="ch-name">${name}</div></div>
    ${right}
  </div>`;
}
function sbar(ps) {
  const r=26, c=2*Math.PI*r, off=c-(ps.pct/100)*c;
  return `<div class="sbar">
    <div class="stb"><div class="stn">${ps.done}</div><div class="stl">Complete</div></div>
    <div class="stsp"></div>
    <div class="stb"><div class="stn">${ps.ip||0}</div><div class="stl">In Progress</div></div>
    <div class="stsp"></div>
    <div class="stb"><div class="stn">${ps.tot}</div><div class="stl">Total</div></div>
    <div class="stsp"></div>
    <div class="rw">
      <svg width="60" height="60" viewBox="0 0 64 64" style="transform:rotate(-90deg)">
        <circle cx="32" cy="32" r="${r}" fill="none" stroke="#222" stroke-width="5"/>
        <circle cx="32" cy="32" r="${r}" fill="none" stroke="${ps.pct>=100?'#4ade80':'#00A3E0'}" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
          style="--ring-full:${c};--ring-target:${off};animation:ringGrow .6s cubic-bezier(.25,.46,.45,.94) both"/>
      </svg>
      <div class="rl"><div class="rpct">${ps.pct}%</div></div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════
function onSC(sel) {
  if(!guardAdmin()){const d=gis(sel.dataset.t,sel.dataset.p,sel.dataset.i);sel.value=d.status;sel.className='ss '+scls(d.status);return;}
  const {t,p,i} = sel.dataset;
  sis(t,p,i,'status',sel.value);
  sel.className = 'ss ' + scls(sel.value);
  refreshStats(t,p);
  toast('Saved ✓');
}
function onFC(inp) {
  if(!guardAdmin()) return;
  const {t,p,i,f} = inp.dataset;
  sis(t,p,i,f,inp.value);
}
function onMeta(inp) {
  if(!guardAdmin()) return;
  const {tier,sec,item,f} = inp.dataset;
  const section = gsecs(tier).find(s => s.id===sec); if (!section) return;
  const it = section.items.find(x => x.id===item); if (!it) return;
  it[f] = inp.value; save();
}
function refreshStats(tier,prod) {
  renderSB();
  const ps = prodStats(tier,prod);
  const sb = document.getElementById('sbar');
  if (sb) sb.outerHTML = sbar(ps);
  for (const sec of gsecs(tier)) {
    let d=0;
    sec.items.forEach(it => { if (gis(tier,prod,it.id).status==='Complete') d++; });
    const el = document.getElementById('cp-'+sec.id);
    if (el) el.textContent = `${d}/${sec.items.length}`;
  }
}
function toggleCat(id) { document.getElementById('cb-'+id)?.classList.toggle('collapsed'); }

// ═══════════════════════════════════════════════════════════════
// SECTION ACTIONS
// ═══════════════════════════════════════════════════════════════
function addSec(tier) {
  if(!guardAdmin()) return;
  const n = document.getElementById('as-inp')?.value.trim();
  if (!n) { toast('Enter a section name'); return; }
  const d = ald(); if (!d) return;
  if (!d.sections[tier]) d.sections[tier] = [];
  d.sections[tier].push({id:uid(), name:n, icon:ICONS[gsecs(tier).length%ICONS.length], items:[]});
  save(); renderMain(); toast('Section added');
  document.getElementById('as-inp')?.focus();
}
function renameSec(tier,secId,cur) {
  if(!guardAdmin()) return;
  modal('Rename Section',[['Name','text','rs-n','Name…',cur]],'Save','var(--blue)',() => {
    const n = qv('rs-n'); if (!n) return false;
    const sec = gsecs(tier).find(s => s.id===secId); if (!sec) return;
    sec.name = n; save(); renderMain(); toast('Renamed');
  });
}
function confirmDelSec(tier,secId,name) {
  if(!guardAdmin()) return;
  const d = ald(); if (!d) return;
  const secs = d.sections[tier] || [];
  const idx = secs.findIndex(s => s.id===secId); if (idx===-1) return;
  const removed = JSON.parse(JSON.stringify(secs[idx]));
  secs.splice(idx, 1);
  save(); render();
  toast(`Deleted "${name}"`, false, () => {
    const d2 = ald(); if (!d2) return;
    if (!d2.sections[tier]) d2.sections[tier] = [];
    d2.sections[tier].splice(idx, 0, removed);
    save(); render();
    toast('Section restored');
  });
}

// ═══════════════════════════════════════════════════════════════
// ITEM ACTIONS
// ═══════════════════════════════════════════════════════════════
function addItem(tier,secId) {
  if(!guardAdmin()) return;
  const n = document.getElementById('ain-'+secId)?.value.trim();
  const notes = document.getElementById('ait-'+secId)?.value.trim()||'';
  if (!n) { toast('Enter a deliverable name'); return; }
  const sec = gsecs(tier).find(s => s.id===secId); if (!sec) return;
  sec.items.push({id:uid(), name:n, notes});
  save(); renderMain(); toast('Item added');
  document.getElementById('ain-'+secId)?.focus();
}
function confirmDelItem(tier,secId,itemId,name) {
  if(!guardAdmin()) return;
  const sec = gsecs(tier).find(s => s.id===secId); if (!sec) return;
  const idx = sec.items.findIndex(i => i.id===itemId); if (idx===-1) return;
  const removed = sec.items.splice(idx, 1)[0];
  // Also snapshot status data for all products in this tier
  const d = ald(); if (!d) return;
  const statusBackup = {};
  for (const prod of (d.products[tier]||[])) {
    const k = `${tier}||${prod}`;
    if (d.status[k] && d.status[k][itemId]) {
      statusBackup[k] = JSON.parse(JSON.stringify(d.status[k][itemId]));
      delete d.status[k][itemId];
    }
  }
  save(); renderMain();
  toast(`Removed "${name}"`, false, () => {
    const sec2 = gsecs(tier).find(s => s.id===secId);
    if (sec2) {
      sec2.items.splice(idx, 0, removed);
      // Restore status data
      const d2 = ald();
      if (d2) {
        for (const [k, v] of Object.entries(statusBackup)) {
          if (!d2.status[k]) d2.status[k] = {};
          d2.status[k][itemId] = v;
        }
      }
      save(); renderMain();
      toast('Item restored');
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// PRODUCT ACTIONS
// ═══════════════════════════════════════════════════════════════
function addProduct() {
  if(!guardAdmin()) return;
  const tier = document.getElementById('np-tier').value;
  const name = document.getElementById('np-name').value.trim();
  if (!name) { toast('Enter a product name'); return; }
  const d = ald(); if (!d) return;
  if (!d.products[tier]) d.products[tier] = [];
  if (d.products[tier].includes(name)) { toast('Already exists'); return; }
  d.products[tier].push(name);
  document.getElementById('np-name').value = '';
  save(); goProd(tier,name); toast('Product added: '+name);
}
function renameProd(tier,prod) {
  if(!guardAdmin()) return;
  modal('Rename Product',[['Name','text','rp-n','Name…',prod]],'Save','var(--blue)',() => {
    const n = qv('rp-n'); if (!n) return false;
    const d = ald(); if (!d) return;
    const idx = (d.products[tier]||[]).indexOf(prod); if (idx===-1) return;
    const ok = tier+'||'+prod, nk = tier+'||'+n;
    if (d.status[ok]) { d.status[nk]=d.status[ok]; delete d.status[ok]; }
    d.products[tier][idx] = n;
    if (V.type==='product' && V.tier===tier && V.prod===prod) V.prod=n;
    save(); render(); toast('Renamed');
  });
}
function confirmDelProd(tier,prod) {
  if(!guardAdmin()) return;
  modal('Remove Product',`Remove "${prod}" from ${tier}?`,'Remove','#ef4444',() => {
    const d = ald(); if (!d) return;
    d.products[tier] = (d.products[tier]||[]).filter(p => p!==prod);
    delete d.status[`${tier}||${prod}`];
    if (V.type==='product' && V.tier===tier && V.prod===prod) goOv();
    else { save(); render(); }
    save(); toast('Removed');
  });
}

// ═══════════════════════════════════════════════════════════════
// TIER ACTIONS
// ═══════════════════════════════════════════════════════════════
function addTier() {
  if(!guardAdmin()) return;
  const n = document.getElementById('add-tier-inp')?.value.trim();
  if (!n) { toast('Enter a tier name'); return; }
  const d = ald(); if (!d) return;
  if (d.tiers.includes(n)) { toast('Already exists'); return; }
  d.tiers.push(n);
  if (!d.products[n]) d.products[n] = [];
  if (!d.sections[n] || !d.sections[n].length) {
    // Clone Flagship & Custom sections as the default template
    const template = d.sections['Flagship & Custom'] || DEF_SECS['Flagship & Custom'] || [];
    d.sections[n] = JSON.parse(JSON.stringify(template)).map(sec => {
      sec.id = uid();
      sec.items = sec.items.map(it => { it.id = uid(); return it; });
      return sec;
    });
  }
  save(); renderMain(); toast('Tier added');
  document.getElementById('add-tier-inp')?.focus();
}
function renameTier(tier) {
  if(!guardAdmin()) return;
  modal('Rename Tier',[['Name','text','rt-n','Name…',tier]],'Save','var(--blue)',() => {
    const n = qv('rt-n'); if (!n||n===tier) return false;
    const d = ald(); if (!d) return;
    const idx = d.tiers.indexOf(tier); if (idx===-1) return;
    d.tiers[idx] = n;
    d.products[n] = d.products[tier]||[]; delete d.products[tier];
    d.sections[n] = d.sections[tier]||[]; delete d.sections[tier];
    for (const k of Object.keys(d.status)) {
      if (k.startsWith(tier+'||')) {
        const p = k.slice(tier.length+2);
        d.status[`${n}||${p}`] = d.status[k]; delete d.status[k];
      }
    }
    if (V.type==='product' && V.tier===tier) V.tier=n;
    save(); render(); toast('Tier renamed');
  });
}
function confirmDelTier(tier) {
  if(!guardAdmin()) return;
  const d = ald();
  const n = (d?.products[tier]||[]).length;
  modal('Delete Tier',
    `Delete "${tier}" and all ${n} product${n!==1?'s':''}? Cannot be undone.`,
    'Delete','#ef4444',() => {
      const d = ald(); if (!d) return;
      d.tiers = d.tiers.filter(t => t!==tier);
      delete d.products[tier]; delete d.sections[tier];
      for (const k of Object.keys(d.status)) {
        if (k.startsWith(tier+'||')) delete d.status[k];
      }
      if (V.type==='product' && V.tier===tier) goOv(); else render();
      save(); toast('Tier deleted');
    });
}

// ═══════════════════════════════════════════════════════════════
// STATUS ACTIONS
// ═══════════════════════════════════════════════════════════════
function addStatus() {
  if(!guardAdmin()) return;
  const label = document.getElementById('add-st-inp')?.value.trim();
  if (!label) { toast('Enter a status name'); return; }
  if (!G.statuses) G.statuses = JSON.parse(JSON.stringify(DEF_STATUSES));
  if (G.statuses.find(s => s.label===label)) { toast('Already exists'); return; }
  G.statuses.push({label, cls:'custom'});
  save(); renderMain(); toast('Status added');
  document.getElementById('add-st-inp')?.focus();
}
function delStatus(i) {
  if(!guardAdmin()) return;
  if (i<2) { toast('Cannot remove built-in statuses'); return; }
  if (!G.statuses) G.statuses = JSON.parse(JSON.stringify(DEF_STATUSES));
  const label = G.statuses[i]?.label;
  G.statuses.splice(i,1); save(); renderMain();
  toast(label ? `"${label}" removed` : 'Status removed');
}
function setStCls(i,cls) {
  if(!guardAdmin()) return;
  if (!G.statuses) G.statuses = JSON.parse(JSON.stringify(DEF_STATUSES));
  if (G.statuses[i]) { G.statuses[i].cls=cls; save(); renderMain(); }
}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function modal(title, fields, okLabel, okColor, onOk, extraBtns) {
  let body = '';
  if (typeof fields === 'string') {
    body = `<div class="mmsg">${fields}</div>`;
  } else {
    for (const [lbl,type,id,ph,val] of fields) {
      body += `<label class="mlbl">${lbl}</label>
        <input id="${id}" class="minp" type="${type}" placeholder="${xe(ph)}" value="${xe(val||'')}"
          onkeydown="if(event.key==='Enter')document.getElementById('m-ok').click()"/>`;
    }
  }
  document.getElementById('mc').innerHTML = `
    <div class="mbk" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="mttl">${title}</div>
        ${body}
        <div class="macts">
          <button class="mcancel" onclick="closeModal()">Cancel</button>
          ${extraBtns||''}
          <button class="mok" id="m-ok" style="background:${okColor}">${okLabel}</button>
        </div>
      </div>
    </div>`;
  if (Array.isArray(fields) && fields.length) {
    const f = document.getElementById(fields[0][2]);
    if (f) { f.focus(); if (f.type!=='date') f.select(); }
  }
  document.getElementById('m-ok').onclick = () => {
    if (onOk() !== false) closeModal();
  };
}
function closeModal() { document.getElementById('mc').innerHTML=''; }
function qv(id) { return document.getElementById(id)?.value?.trim()||''; }

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function xe(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function scls(s) {
  const st = gstatuses().find(x => x.label===s);
  return st ? st.cls : 'not-started';
}
let _tt;
let _undoFn = null;
function toast(msg, isErr, undoFn) {
  const t = document.getElementById('toast');
  const tm = document.getElementById('toast-msg');
  const tu = document.getElementById('toast-undo');
  tm.textContent = msg;
  t.className = 'toast' + (isErr?' err':'');
  t.classList.add('show');
  _undoFn = undoFn || null;
  tu.style.display = undoFn ? 'inline-block' : 'none';
  clearTimeout(_tt);
  _tt = setTimeout(() => { t.classList.remove('show'); _undoFn = null; }, undoFn ? 5000 : 2200);
}
function doUndo() {
  if (_undoFn) { _undoFn(); _undoFn = null; }
  const t = document.getElementById('toast');
  t.classList.remove('show');
  clearTimeout(_tt);
}

setSyncUI('ok');
applyAdminUI();
render();
initSupabase();
